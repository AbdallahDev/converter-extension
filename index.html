<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="index.css" />
    <title>Unit Convertor</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div id="fullApp">
      <div id="headDiv">
        <div id="headTitle">Metric/Imperial Unit Conversion</div>
        <input type="text" name="" id="valueInput" />
        <button id="convertBtn">Convert</button>
      </div>
      <div id="conversionCards">
        <div id="card" class="card">
          <div id="title" class="cardTitle">Length (Meter/Feet)</div>
          <div id="conversions">
            20 meteres = 65.554 feet | 20 feet = 5.056 meters
          </div>
        </div>
        <div id="card" class="card">
          <div id="title" class="cardTitle">Length (Meter/Feet)</div>
          <div id="conversions" class="cardConversions">
            20 meteres = 65.554 feet | 20 feet = 5.056 meters
          </div>
        </div>
        <div id="card" class="card">
          <div id="title" class="cardTitle">Length (Meter/Feet)</div>
          <div id="conversions">
            20 meteres = 65.554 feet | 20 feet = 5.056 meters
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
