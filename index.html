<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="index.css" />
    <title>Unit Convertor</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div id="fullApp">
      <div id="headDiv">
        <div id="headTitle">Metric/Imperial Unit Conversion</div>
        <input type="text" name="" id="valueInput" value="2" />
        <button id="convertBtn">Convert</button>
      </div>
      <div id="conversionCards">
        <div hidden id="lengthCard" class="card">
          <div hidden id="title" class="cardTitle">Length (Meter/Feet)</div>
          <div hidden id="conversions">
            <span id="lengthMetersValue">20</span> meters =
            <span id="lenghtFeetConversionValue">65.554</span> feet
            <br />
            <span id="lengthFeetValue">20</span> feet =
            <span id="lengthMetersConversionValue">9.072</span> meters
          </div>
        </div>
        <div hidden id="volumeCard" class="card">
          <div hidden id="title" class="cardTitle">Volume (Liters/Gallons)</div>
          <div hidden id="conversions" class="cardConversions">
            <span id="volumeLitersValue">20</span> liters =
            <span id="volumeGallonsConversionValue">65.554</span> gallons
            <br />
            <span id="volumeGallonsValue">20</span> gallons =
            <span id="volumelitersConversionValue">9.072</span> liters
          </div>
        </div>
        <div hidden id="massCard" class="card">
          <div hidden id="title" class="cardTitle">Mass (Kilograms/Pounds)</div>
          <div hidden id="conversions">
            <span id="massKilosValue">20</span> kilos =
            <span id="massPoundsConversionValue">65.554</span> pounds
            <br />
            <span id="massPoundsValue">20</span> pounds =
            <span id="massKilosConversionValue">9.072</span> kilos
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
